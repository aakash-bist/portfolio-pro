<div
  class="window"
  [class.focused]="state().focused"
  [class.maximized]="state().maximized"
  [class.minimized]="state().minimized"
  [style.left.px]="state().maximized ? 0 : state().x"
  [style.top.px]="state().maximized ? 0 : state().y"
  [style.width.px]="state().maximized ? null : state().width"
  [style.height.px]="state().maximized ? null : state().height"
  [style.z-index]="state().zIndex"
  (mousedown)="onWindowClick()"
  #windowEl
>
  <div class="title-bar" (mousedown)="onTitleBarMouseDown($event)">
    <span class="title-text">{{ state().title }}</span>
    <div class="title-bar-buttons">
      <button class="btn-minimize" (click)="onMinimize()" (mousedown)="$event.stopPropagation()">
        <svg viewBox="0 0 12 12"><line x1="2" y1="6" x2="10" y2="6"/></svg>
      </button>
      <button class="btn-maximize" (click)="onMaximize()" (mousedown)="$event.stopPropagation()">
        <svg viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" rx="1" fill="none"/></svg>
      </button>
      <button class="btn-close" (click)="onClose()" (mousedown)="$event.stopPropagation()">
        <svg viewBox="0 0 12 12"><line x1="3" y1="3" x2="9" y2="9"/><line x1="9" y1="3" x2="3" y2="9"/></svg>
      </button>
    </div>
  </div>

  <div class="window-content">
    <ng-content />
  </div>

  <div class="resize-handle" (mousedown)="onResizeMouseDown($event)"></div>
</div>
